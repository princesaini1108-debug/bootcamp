<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>
    <div>
        <table>
            <!-- Dont change order of columns -->
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Doctor ID</th>
                    <th>Specialization</th>
                    <th>Experience in years</th>
                    <th>Email address</th>
                    <th>Mobile Number</th>
                    <th>Role</th>
                    <th>Add/Delete</th>
                    <!-- <th>add</th> -->
                </tr>
            </thead>
            <tbody>
    </div>
</body>

</html>
<script>
    let addarr = JSON.parse(localStorage.getItem("add")) || [];
    tabledetail(addarr);

    function tabledetail(arr) {
        document.querySelector("tbody").innerText = ""
        arr.forEach((el, i) => {
            const row = document.createElement("tr");
            const td1 = document.createElement("td");
            td1.innerText = el.name;

            const td2 = document.createElement("td");
            td2.innerText = el.docid;

            const td3 = document.createElement("td");
            td3.innerText = el.spacelization;

            const td4 = document.createElement("td");
            td4.innerText = el.exp;

            const td5 = document.createElement("td");
            td5.innerText = el.email;

            const td6 = document.createElement("td");
            td6.innerText = el.mobile;

            const td7 = document.createElement("td")
            // const role = document.createElement("role")
            let category = ""

            if (el.exp > 5) {
                category = "senior"

            } else if (el.exp > 2 && el.exp < 5) {
                category = "junior"

            } else {
                category = "trainee"
            }
            td7.innerText = category;
            // console.log(td7);

            const td8 = document.createElement("button");
            td8.innerText = "deleted";

            // td8.addEventListener("click", function () {
            //     addarr.splice(i, 1)
            //     localStorage.setItem("del", JSON.stringify(addarr));
            //     alert("deleted in the memory")
            // })

            // const td8 = document.createElement("button");
            // td8.innerText = "add";
            td8.addEventListener("click", function () {
                // addarr.push(el);
                addarr.splice(i, 1);
                localStorage.setItem("add", JSON.stringify(addarr));
                // Swal.fire({
                //     position: "top-end",
                //     icon: "success",
                //     title: "Your data has been deleted sucessfully",
                //     showConfirmButton: false,
                //     timer: 1500
                // });
                Swal.fire({
                    title: "Deleted sucessfully!",
                    icon: "success",
                    draggable: true
                });
                // alert("deleted")
                tabledetail(addarr);

            });




            row.append(td1, td2, td3, td4, td5, td6, td7, td8);
            document.querySelector("tbody").append(row)


        })


    }
</script>
