<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML list</title>
</head>
<body>
    <ol type="A" start="4">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <ol type="I">
        <li>four</li>
        <li>five</li>
        <li>six</li>
    </ol>
    <ol type="1" start="7">
        <li>seven</li>
        <li>eight</li>
        <li>nine</li>
    </ol>
    <ul type="square">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ul>
    <ul type="circle">
        <li>four</li>
        <li>five</li>
        <li>six</li>
    </ul>


</body>
</html>
