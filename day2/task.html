<!DOCTYPE html>

<head>

    <title>Movies</title>
    <style>
        #rowone{
            display: flex;
            justify-content: space-around;
            gap:10px;
           
            

        }

        }

        /* h3,p,button{
            text-align: center;
        } */

        }

            </div>
            <div>
