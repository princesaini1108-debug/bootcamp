<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptol</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
         * {
            text-align: center;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
 
        body {
            background-color: #f1f3f6;
            margin: 0;
            padding: 0 0 40px 0;
        }
 
        h1 {
            background: linear-gradient(120deg, #1d3557, #2c8bb3);
            color: white;
            margin: 0;
            padding: 25px 20px;
            font-size: 26px;
        }
 
        #search {
            padding: 10px 16px;
            width: 280px;
            max-width: 80vw;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            margin: 20px 8px 10px 8px;
        }
 
        #sort {
            padding: 10px 16px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            margin: 20px 8px 10px 8px;
        }
 
        #root {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px 30px 0 30px;
        }
 
        #root>div {
            background: #fff;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 3px 10px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
 
        #root>div:hover {
            transform: translateY(-6px);
            box-shadow: rgba(0, 0, 0, 0.25) 0px 10px 20px;
        }
 
        img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #fafafa;
            padding: 10px;
        }
 
        h3 {
            font-size: 14px;
            color: #1a1a2e;
            padding: 4px 12px;
        }
 
        p {
            font-size: 12px;
            color: #777;
            padding: 4px 12px;
            line-height: 1.4;
        }
 
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 8px 14px;
        }
 
        button {
            padding: 10px 15px;
            border: none;
            background-color: rgb(44, 139, 179);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            margin: 8px 6px;
            border-radius: 8px;
        }
 
        button:hover {
            background-color: yellowgreen;
            cursor: pointer;
        }
 
        @media (max-width: 1000px) {
            #root {
                grid-template-columns: repeat(2, 1fr);
                padding: 20px 16px 0 16px;
            }
        }
 
        @media (max-width: 500px) {
            #root {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <h1>Welcome to Naptol Product Page</h1>

    <input type="text" id="search" placeholder="search Product ..." oninput="search()">

    <select id="sort" onchange="sort()">
        <option value="asc">asc</option>
        <option value="dsc">dsc</option>
    </select>

    <div id="root">
        <!-- All Product come here... -->
    </div>
</body>

</html>

<script>

    let bag = []
    let cartArr = JSON.parse(localStorage.getItem("cart")) || []
    const api = "https://fakestoreapi.com/products";

    fetch(api)
        .then((res) => res.json())
        .then((data) => {
            console.log(data)
            bag = data
            displayCart(data);
        }
        ).catch((err) => console.log(err)
        )


    function displayCart(arr) {
        document.querySelector("#root").innerText = ""
        arr.forEach((el) => {

            const box = document.createElement("div");

            const image = document.createElement("img");
            image.setAttribute("src", el.image);

            const title = document.createElement("h3");
            title.innerText = `Title: ${el.title}`

            const category = document.createElement("h3");
            category.innerText = `Category: ${el.category}`

            const description = document.createElement("p");
            description.innerText = `Description: ${el.description}`

            const price = document.createElement("button");
            price.innerText = `Price: ${el.price}`

            const rating = document.createElement("button");
            rating.innerText = `Rating: ${el.rating.rate}`

            const hrr = document.createElement("hr");

            const cart = document.createElement("button");
            cart.innerText = "Add to Cart"

            cart.addEventListener("click", function () {
                cartArr.push(el);

                localStorage.setItem("cart", JSON.stringify(cartArr));
                // alert("Product added to cart")
                Swal.fire({
                    title: "Good job!",
                    text: "Product added to cart",
                    icon: "success"
                });
            })

            box.append(image, title, category, description, price, rating, hrr, cart);

            document.querySelector("#root").append(box)
        })
    }

    function search() {
        console.log(bag);

        const query = document.querySelector("#search").value

        const filterData = bag.filter((el) => {
            return el.category.toLowerCase().includes(query.toLowerCase())
        });

        console.log(filterData);

        displayCart(filterData)


    }


    function sort() {
        const query = document.querySelector("#sort").value

        if (query == "asc") {
            const ans = bag.sort((a, b) => a.price - b.price);
            displayCart(ans)
        } else {
            const ans = bag.sort((b, a) => a.price - b.price);
            displayCart(ans)
        }

    }
</script>
