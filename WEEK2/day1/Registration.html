<!DOCTYPE html>
<html>

<head>
    <title>Registration</title>
</head>

<body>
    <input type="text" name="name" id="name">
    <select id="gender">
        <option value="">--</option>
        <option value="male">M</option>
        <option value="female">F</option>
    </select>
    <input type="text" name="email" id="email">
    <input type="text" name="mobile" id="mobile">
    <hr>
    <h1 id="dName">NAME</h1>
    <h2 id="dGender">GENDER</h2>
    <h3 id="dEmail">EMAIL</h3>
    <h4 id="dMobile">MOBILE</h4>
    <hr>
    <button onclick="showName()">NAME</button>
    <button onclick="showGender()">GENDER</button>
    <button onclick="showEmail()">EMAIL</button>
    <button onclick="showMobile()">MOBILE</button>
    <button onclick="resetForm()">RESET FORM</button>
    <button onclick="resetDisplay()">RESET DISPLAY</button>
    <script type="text/javascript">
        function showName() {
            // Show filled name inside h1
            // const dname = document.getElementById("dName");
            // const name = document.getElementById("name");
            // const data=name.value
            // console.log(data);
            resetDisplay();
            document.querySelector("#dName").innerText = document.querySelector("#name").value;


            // const name = document.getElementById("name");
            // document.getElementById("dName").innerText = name;


        }

        function showGender() {
            // Show the selected gender inside h2
            resetDisplay()

            document.querySelector("#dGender").innerText=document.querySelector("#gender").value;

        }

        function showEmail() {
            // Show the filled email inside h3
            resetDisplay()

            document.querySelector("#dEmail").innerText=document.querySelector("#email").value;
        }

        function showMobile() {
            // Show the filled mobile inside h4
            resetDisplay()
            document.querySelector("#dMobile").innerText=document.querySelector("#mobile");
        }

        function resetForm() {
            // Reset all the form elements to default values (blank "")
             document.querySelector("#name").value = "";
            document.querySelector("#gender").value = "";
            document.querySelector("#email").value = "";
            document.querySelector("#mobile").value = "";
        }

        function resetDisplay() {
            document.querySelector("#dName").innerText = "";
            document.querySelector("#dGender").innerText = "";
            document.querySelector("#dEmail").innerText = "";
            document.querySelector("#dMobile").innerText = "";
            // Reset all the headings (h1, h2, h3, h4) to blank values
        }
    </script>
</body>

</html>
