<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <center><h1>Weekly Schedule</h1></center>
    <!-- <center><caption><b>Weekly Schedule</b></caption></center> -->
    <table border="1" cellspacing="0" cellpadding="10">
        <tr>
            <th>Title</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
        <tr>
            <td rowspan="2">Morning</td>
            <td>Math</td>
            <td rowspan="2" colspan="2">Science lab</td>
            <!-- <td>Science lab</td> -->
            <td>History</td>
            <td>English</td>
        </tr>
        <tr>
            <!-- <td>good morning</td> -->
            <td>Physics</td>
            <!-- <td >Science lab</td> -->
            <!-- <td>Science lab</td> -->
            <td>Geography</td>
            <td>Sports</td>
        </tr>
        <tr>
            <td>Afternoon</td>
            <td colspan="5">lunch break</td>
            <!-- <td>lunch break</td> -->
            <!-- <td>lunch break</td> -->
            <!-- <td>lunch break</td> -->
            <!-- <td>lunch break</td> -->
        </tr>
        <tr>
            <td>Evening</td>
            <td>Computer science</td>
            <td>Art</td>
            <td rowspan="2">Music</td>
            <td>Drama</td>
            <td>Free period</td>
        </tr>
        <tr>
           <td>late evening</td>
           <td colspan="2">self study</td>
           <!-- <td>self study</td> -->
           <!-- <td>Music</td> -->
           <td>Debate</td>
           <td>Sport</td>
        </tr>
    </table>
</body>
</html>
