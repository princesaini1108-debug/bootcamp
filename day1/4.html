<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <table border="1" cellsapcing="0" cellpadding="10">
        <thead>
            <tr>
                <th>S No.</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">1</td>
                <td colspan="2">John</td>
                <!-- <td>25</td> -->
            </tr>
            <tr>
                <!-- <td>2</td> -->
                <td>Jane</td>
                <td>30</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
