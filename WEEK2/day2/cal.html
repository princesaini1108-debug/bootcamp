<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        .calculator {
            /* border: 1px solid black; */
            padding: 10px;
            width: 500px;
            height: 450px;
            margin: auto;
            border-radius: 12px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        }

        #input {
            /* border: 1px solid black; */
            /* padding: 20px; */
            width: 450px;
            height: 60px;
            margin: 15px auto;
            border-radius: 12px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;


        }

        #keyboard {
            width: 450px;
            height: 350px;
            margin: auto;
            border-radius: 12px;
            /* border: 1px solid black; */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            /* padding: 10px; */
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;


        }

        #keyboard>div {
            /* border: 1px solid rgb(247, 241, 241); */
            /* margin: auto; */
            font-size: 30px;
            font-weight: 900;
            border-radius: 12px;
            padding-top: 25px;
            text-align: center;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        }

        h1 {
            text-align: center;
            color: teal;
        }

        .blk {
            background-color: rgba(0, 0, 0, 0.841);
            color: white;
        }

        #rd {
            background-color: rgb(246, 11, 11);
            color: white;
        }
        #keyboard>div:hover{
            cursor: pointer;
            background-color: #f2d7d138;
        }
    </style>
</head>

<body>
    <h1>CALCULATOR</h1>
    <div class="calculator">
        <div id="input"></div>
        <div id="keyboard">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div class="blk">+</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div class="blk">-</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div class="blk">*</div>
            <div id="rd">C</div>
            <div>0</div>
            <div class="blk">=</div>
            <div class="blk">\</div>
        </div>
    </div>
</body>

</html>

<script>
    let bag=""

    // step1 select/catch the element

    const keys=document.querySelectorAll("#keyboard > div");
    // console.log(keys);

    // step2  attach event

    for(let i=0;i<keys.length;i++){
        keys[i].addEventListener("click",mycal)
    }

    // step3  handle event

    function mycal(e){
        let targetNumber=e.target.innerText
        // console.log(targetNumber);

        const display=document.querySelector("#input");
        // display.innerText= targetNumber

        if(targetNumber == "C"){
            bag=""
            display.innerText=bag;

        }else if(targetNumber == "="){
            let ans=eval(bag)
            display.innerText=ans;
        }else{
            bag+=targetNumber;
            display.innerText=bag;
        }
        
    }
    
</script>
