<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get value from input tag</title>
</head>

<body>
    <input type="text" id="ip" placeholder="enter your name">
    <button onclick="getname()">sumbit</button>
</body>

</html>

<script>
    function getname() {
        // step1 select
        const ip = document.getElementById("ip");
        console.log(ip);

        // step2 read

        const data = ip.value;
        console.log(data);
    }
</script>
