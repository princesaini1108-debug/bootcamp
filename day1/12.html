<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="">
        <label for="name"> Your Name</label>
        <input type="text" id="name" name="name" placeholder="enter your name">
        <br>
        <label for="email"> Your Email</label>
        <input type="email" id="email" name="email" placeholder="enter your email">
        <br>
        <label for="Age"> Your Age</label>
        <input type="number" id="Age" name="Age" placeholder="enter your age">
        <br>
        
        <label for="Select Event Category">Select Event Category:</label>
        <br>

        <input type="checkbox" id="coding" name="Select Event Category">
        <label for="coding">Coding Hackathon</label>
        <br>

        <input type="checkbox" id="Debate Competition" name="Select Event Category">
        <label for="Debate Competition">Debate Competition</label>
        <br>

        <input type="checkbox" id="sports tournament" name="Select Event Category">
        <label for="sports tournament">Sports Tournament</label>
        <br>

        <label for="date">Event Date:</label>
        <input type="date" id="date" name="date" required>
        <br>
        
        <label for="time">Preferred Time Slot:</label>
        <input type="time" id="time" name="time">
        <br>

        <button type="submit">Resigter Now
    </form>
</body>
</html>
