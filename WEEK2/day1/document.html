<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Coding Student</h1>
    <button onClick="changeRed()">Change Text color to red</button>
    <button onClick="changeYellow()">Change Text color to yellow</button>
  </body>
</html>

<script>

  function changeRed(){
    // change text color of h1 to red
    const heading=document.getElementsByTagName("h1")[0];
    heading.style.color="red";


    const heading1=document.querySelector("h1");
    // heading1.style.color="red";
  }

  function changeYellow(){
    // change text color of h1 to yellow
    const heading=document.getElementsByTagName("h1")[1];
    heading.style.color="red";


    const heading1=document.querySelector("h1");
    // heading1.style.color="yellow";
  }
</script>
