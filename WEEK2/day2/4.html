<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting HTML element via JS</title>
</head>
<body>
    <!-- <h1 id="head">hello world</h1> -->
</body>
</html>

<script>
    //step 1 create element

    const el=document.createElement("h1");
    console.log(el);

    //step2 set/write value

    el.innerText="hello world"

    //step3  setattribute

    el.setAttribute("id","head")

    //step 4 attach/append  to the element
    document.querySelector("body").append(el);

    //step5
    el.style.color="teal";
    
</script>
