<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form in html</title>
</head>
<body>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" required>
        <br>

        <label for="Dob">Date of Birth:</label>
        <input type="date" id="Dob" name="Dob" required>
        <br>

        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>
        <br>

        <label for="language">Language:</label>
        <input type="checkbox" id="english" name="language" value="english">
        <label for="english">English</label>
        <input type="checkbox" id="spanish" name="language" value="spanish">
        <label for="spanish">Spanish</label>
        <input type="checkbox" id="french" name="language" value="french">
        <label for="french">French</label>

        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="">Select course</option>
            <option value="BBA">BBA</option>
            <option value="B.COM">B.COM</option>
            <option value="B.TECH">B.TECH</option>
        </select>
        <br>
        <label for="summary">Summary:</label>
        <textarea id="summary" name="summary" placeholder="Write something about yourself" required></textarea>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>


    </form>
</body>
</html>
